<!DOCTYPE html>
<html>
<head>
    <title>Certificate Verification</title>
</head>
<body>
    <h2>Enter Certificate Details</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <label for="student_id">Student ID:</label>
        <input type="text" name="student_id" id="student_id" required><br><br>

        <label for="cert_id">Certificate ID:</label>
        <input type="text" name="cert_id" id="cert_id" required><br><br>

        <label for="certificate">Upload Certificate:</label>
        <input type="file" name="certificate" id="certificate" required><br><br>

        <button type="submit">Verify</button>
    </form>
</body>
</html>
